name: QA (experiment pages)

# 모든 실험 페이지를 헤드리스 브라우저로 검증한다.
#  - 교차 브라우저: Chromium · Firefox · WebKit (탭 전환 · 콘솔 에러 0 · 허브 ready/언어 수)
#  - 접근성: axe-core 로 WCAG 2 A/AA serious·critical 위반 0
# 배포(deploy.yml)와 독립적인 품질 게이트.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test tooling
        run: npm install

      - name: Install browsers (Chromium · Firefox · WebKit)
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Serve src/
        run: |
          python3 -m http.server 8000 --directory src &
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8000/index.html >/dev/null && break
            sleep 0.5
          done

      - name: Run cross-browser QA
        run: npm test

      - name: Run accessibility audit (WCAG AA)
        run: npm run test:a11y
